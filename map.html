<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Network Map - Hemo Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="bloodlink.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        #map {
            height: calc(100vh - 100px);
            width: 100%;
            border-radius: 24px;
            border: 2px solid #00d2ff;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            margin-top: 20px;
            background: #0f172a;
        }
        .map-overlay {
            position: absolute;
            top: 100px;
            left: 70px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.85);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }
        .dot-donor { background: #39ff14; color: #39ff14; }
        .dot-patient { background: #ff3131; color: #ff3131; }

        /* Custom Marker Styles */
        .neon-marker {
            background: none;
            border: none;
        }
        .marker-inner {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 15px currentColor;
            animation: marker-pulse 2s infinite;
        }
        @keyframes marker-pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="logo">
            <img src="logo.svg" alt="🩸" style="height: 35px; width: auto;">
            <div class="logo-text">
                <div class="logo-main" style="font-size: 20px;">
                    <span class="hemo">HEMO</span><span class="connect">CONNECT</span>
                </div>
                <div class="logo-subtext" style="font-size: 7px;">Intelligent Blood Logistics</div>
            </div>
        </a>
        <div style="display:flex; gap:15px; align-items:center;">
            <a href="dashboard.html" class="logout-btn" style="background: rgba(255,255,255,0.1);">Back to Dashboard</a>
        </div>
    </nav>

    <div class="main-container" style="padding: 20px 50px;">
        <div class="page-title" style="margin-bottom: 20px; text-align: left;">
            <h1 style="font-size: 28px;">Live Network Status</h1>
            <p style="margin-top: 5px; text-align: left; margin-left: 0;">Real-time visualization of donors and patients</p>
        </div>

        <div class="map-overlay">
            <h3 style="margin-bottom: 15px; font-size: 16px;">Network Legend</h3>
            <div class="legend-item">
                <div class="dot dot-donor"></div>
                <span>Active Donors</span>
            </div>
            <div class="legend-item">
                <div class="dot dot-patient"></div>
                <span>Active Blood Requests</span>
            </div>
            <div id="stats" style="margin-top: 15px; font-size: 12px; color: rgba(255,255,255,0.6); border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
                Loading live data...
            </div>
        </div>

        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="map.js"></script>
</body>
</html>
